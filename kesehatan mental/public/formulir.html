<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Konsultasi Kesehatan Mental</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  
    <div class="container">
        <h1>Formulir Pendaftaran Konsultasi Kesehatan Mental</h1>
        <form id="registrationForm" action="/registrasi" method="POST">
            <label for="name">Nama:</label>
            <input type="text" id="name" name="name" required>
        
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        
            <label for="phone">Nomor Telepon:</label>
            <input type="tel" id="phone" name="phone" required>
        
            <label for="dokter">Dokter Pilihan:</label>
            <select id="dokter">
                <option value="drSmith">Dr. Musfara</option>
                <option value="drJones">Dr. Nazwa</option>
                <option value="drDoe">Dr. Kayla</option>
                <option value="drDoe">Dr. Nadya</option>
                <option value="drDoe">Dr. Siti</option>
            </select>
        
            <label for="pesan">Pesan Tambahan:</label>
            <textarea id="pesan" name="pesan"></textarea>
        
            <button type="submit">Daftar</button>

            <td><button>
                <a href="index.html" class="tbl">HALAMAN</a>
            </button></td>
        </form>
        <div id="confirmationMessage"></div>
    </div>
    <script>
        function goToDashboard() {
          window.location.href = "index.html";
        }
      </script>

</body>
</html>
